version: '3.8'

services:
  product_service:
    build:
      context: .
      dockerfile: ./product_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  order_service:
    build:
      context: .
      dockerfile: ./order_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002

  api_gateway:
    build:
      context: .
      dockerfile: ./api_gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PRODUCT_SERVICE_URL=http://product_service:8001/products
      - ORDER_SERVICE_URL=http://order_service:8002/orders
    depends_on:
      - product_service
      - order_service
